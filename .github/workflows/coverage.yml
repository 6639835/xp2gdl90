name: Coverage

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  coverage-linux:
    name: Coverage (Linux)
    runs-on: ubuntu-latest
    env:
      CC: clang
      CXX: clang++

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install LLVM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang llvm

      - name: Run coverage
        run: bash scripts/coverage.sh
