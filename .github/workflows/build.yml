name: Build XP2GDL90

on:
  push:
    branches: [main, master, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUILD_TYPE: Release
  CMAKE_BUILD_PARALLEL_LEVEL: 4

jobs:
  format:
    name: Format
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check formatting
        run: clang-format --dry-run --Werror src/*.cpp include/xp2gdl90/*.h tests/*.cpp tests/*.h

  build-windows:
    name: Build Windows
    needs: format
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        run: cmake -S ${{ github.workspace }} -B ${{ github.workspace }}/build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        run: cmake --build ${{ github.workspace }}/build --config ${{ env.BUILD_TYPE }}

      - name: Configure MSFS Bridge
        run: >
          cmake
          -S "${{ github.workspace }}"
          -B "${{ github.workspace }}/build-msfs"
          -DXP2GDL90_BUILD_MSFS=ON
          "-DMSFS_SDK_PATH=${{ github.workspace }}/MSFS SDK"
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build MSFS Bridge
        run: cmake --build "${{ github.workspace }}/build-msfs" --config ${{ env.BUILD_TYPE }} --target msfs2gdl90

      - name: Verify MSFS Bridge Build
        run: |
          $candidatePaths = @(
            "build-msfs/msfs2gdl90.exe",
            "build-msfs/${{ env.BUILD_TYPE }}/msfs2gdl90.exe"
          )
          $bridge = $candidatePaths | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $bridge) {
            Write-Error "Build failed: msfs2gdl90.exe not found (checked: $($candidatePaths -join ', '))"
            exit 1
          }
          Write-Host "MSFS bridge build successful: $bridge"
          Get-Item $bridge | Format-List
          $bridgeDir = Split-Path -Parent $bridge
          $simConnectDll = Join-Path $bridgeDir "SimConnect.dll"
          if (-not (Test-Path $simConnectDll)) {
            Write-Error "Build failed: SimConnect.dll was not copied next to msfs2gdl90.exe"
            exit 1
          }
          Write-Host "SimConnect runtime bundled: $simConnectDll"
          Get-Item $simConnectDll | Format-List
        shell: pwsh

      - name: Verify Build
        run: |
          $candidatePaths = @(
            "build/win.xpl",
            "build/${{ env.BUILD_TYPE }}/win.xpl"
          )
          $plugin = $candidatePaths | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $plugin) {
            Write-Error "Build failed: win.xpl not found (checked: $($candidatePaths -join ', '))"
            exit 1
          }
          Write-Host "Build successful: $plugin"
          Get-Item $plugin | Format-List
        shell: pwsh

      - name: Package
        run: |
          mkdir -p package/xp2gdl90/64 package/xp2gdl90/msfs
          if [ -f "build/win.xpl" ]; then
            cp build/win.xpl package/xp2gdl90/64/
          else
            cp "build/${{ env.BUILD_TYPE }}/win.xpl" package/xp2gdl90/64/
          fi
          if [ -f "build-msfs/msfs2gdl90.exe" ]; then
            cp build-msfs/msfs2gdl90.exe package/xp2gdl90/msfs/
            cp build-msfs/SimConnect.dll package/xp2gdl90/msfs/
          else
            cp "build-msfs/${{ env.BUILD_TYPE }}/msfs2gdl90.exe" package/xp2gdl90/msfs/
            cp "build-msfs/${{ env.BUILD_TYPE }}/SimConnect.dll" package/xp2gdl90/msfs/
          fi
          cp README.md package/xp2gdl90/
          cp LICENSE package/xp2gdl90/
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: xp2gdl90-windows
          path: package/
          if-no-files-found: error
          retention-days: 14

  build-macos:
    name: Build macOS
    needs: format
    runs-on: macos-15-intel

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Configure CMake
        run: cmake -S ${{ github.workspace }} -B ${{ github.workspace }}/build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        run: cmake --build ${{ github.workspace }}/build --config ${{ env.BUILD_TYPE }}

      - name: Verify Build
        run: |
          if [ -f "build/mac.xpl" ]; then
            echo "Build successful: mac.xpl"
            ls -lh build/mac.xpl
            file build/mac.xpl
            lipo -info build/mac.xpl
          else
            echo "Build failed: mac.xpl not found"
            exit 1
          fi

      - name: Package
        run: |
          mkdir -p package/xp2gdl90
          cp build/mac.xpl package/xp2gdl90/
          cp README.md package/xp2gdl90/
          cp LICENSE package/xp2gdl90/

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: xp2gdl90-macos
          path: package/
          if-no-files-found: error
          retention-days: 14

  build-linux:
    name: Build Linux
    needs: format
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libgl1-mesa-dev

      - name: Configure CMake
        run: cmake -S ${{ github.workspace }} -B ${{ github.workspace }}/build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        run: cmake --build ${{ github.workspace }}/build --config ${{ env.BUILD_TYPE }}

      - name: Verify Build
        run: |
          if [ -f "build/lin.xpl" ]; then
            echo "Build successful: lin.xpl"
            ls -lh build/lin.xpl
            file build/lin.xpl
          else
            echo "Build failed: lin.xpl not found"
            exit 1
          fi

      - name: Package
        run: |
          mkdir -p package/xp2gdl90/64
          cp build/lin.xpl package/xp2gdl90/64/
          cp README.md package/xp2gdl90/
          cp LICENSE package/xp2gdl90/

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: xp2gdl90-linux
          path: package/
          if-no-files-found: error
          retention-days: 14

  create-release:
    name: Create Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v7
        with:
          name: xp2gdl90-windows
          path: windows/

      - name: Download macOS Artifact
        uses: actions/download-artifact@v7
        with:
          name: xp2gdl90-macos
          path: macos/

      - name: Download Linux Artifact
        uses: actions/download-artifact@v7
        with:
          name: xp2gdl90-linux
          path: linux/

      - name: Create Combined Package
        run: |
          mkdir -p xp2gdl90/64
          cp macos/xp2gdl90/mac.xpl xp2gdl90/
          cp windows/xp2gdl90/64/win.xpl xp2gdl90/64/
          cp linux/xp2gdl90/64/lin.xpl xp2gdl90/64/
          cp -R windows/xp2gdl90/msfs xp2gdl90/
          cp windows/xp2gdl90/README.md xp2gdl90/
          cp windows/xp2gdl90/LICENSE xp2gdl90/
          zip -r xp2gdl90-${{ github.ref_name }}.zip xp2gdl90/

      - name: Generate checksums
        run: sha256sum xp2gdl90-${{ github.ref_name }}.zip > xp2gdl90-${{ github.ref_name }}.zip.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            xp2gdl90-${{ github.ref_name }}.zip
            xp2gdl90-${{ github.ref_name }}.zip.sha256
          draft: false
          prerelease: false
          body: |
            ## XP2GDL90 ${{ github.ref_name }}

            `xp2gdl90` broadcasts simulator data over UDP in GDL90 format for EFB apps such as ForeFlight, Garmin Pilot, WingX, and FltPlan Go.

            ### Installation

            1. Download `xp2gdl90-${{ github.ref_name }}.zip`.
            2. Extract the ZIP file.
            3. Copy the `xp2gdl90` folder to:

               ```text
               X-Plane 12/Resources/plugins/
               ```

            4. Start X-Plane 12.
            5. Open `Plugins -> XP2GDL90 -> Settings...` to configure the target device and broadcasting options.

            ### Package Structure

            ```text
            xp2gdl90/
            ├── mac.xpl
            ├── 64/
            │   ├── win.xpl
            │   └── lin.xpl
            ├── msfs/
            │   ├── msfs2gdl90.exe
            │   └── SimConnect.dll
            ├── README.md
            └── LICENSE
            ```

            ### Supported X-Plane Plugin Platforms

            - Windows 64-bit
            - macOS Universal (Intel x86_64 + Apple Silicon arm64)
            - Linux 64-bit

            ### Current Features

            - GDL90 heartbeat, ownship report, ownship geometric altitude, and traffic report messages
            - ForeFlight device ID, AHRS extensions, and optional auto-discovery
            - In-simulator ImGui settings and status window
            - JSON settings stored in X-Plane preferences as `xp2gdl90.json`
            - Bundled experimental Windows MSFS 2020/2024 SimConnect bridge

            SHA-256 checksum is provided for download verification.
